{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Teacher - Admin Portal</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/admin_theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/add_teacher.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>

<body>
    {% include 'sidebar_principal.html' %}

    <!-- Main Content -->
    <div class="main-content" style="margin-left: 280px; max-width: calc(100% - 280px);">
        <!-- Top Navigation -->
        <div class="top-nav">
            <a href="{% url 'principal_dashboard' %}" style="text-decoration: none;">
                <div class="nav-tab">Overview</div>
            </a>
        </div>

        <div class="page-header">
            <div>
                <h1>Register New Faculty</h1>
            </div>
            <br>
            <a href="{% url 'principal_dashboard' %}" class="btn-pill"
                style="background: white; border: 1px solid #eee;">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
        <br>

        <div class="split-layout">
            <!-- Left: Form -->
            <div class="content-card">
                <div class="card-header">
                    <h2>Account Details</h2>
                </div>

                <form id="teacherForm" onsubmit="submitForm(event)">
                    {% csrf_token %}
                    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                        <div>
                            <label
                                style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #4B5563;">Full
                                Name</label>
                            <input type="text" id="name" name="name" class="input-field" required
                                placeholder="e.g. Dr. Sarah Smith">
                        </div>
                        <div>
                            <label
                                style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #4B5563;">Username</label>
                            <input type="text" id="username" name="username" class="input-field" required
                                placeholder="e.g. sarah2024">
                        </div>
                        <div>
                            <label
                                style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #4B5563;">Password</label>
                            <input type="password" id="password" name="password" class="input-field" required
                                placeholder="••••••••">
                        </div>
                        <div>
                            <label
                                style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #4B5563;">Department</label>
                            <select id="department" name="department" class="input-field" required>
                                <option value="">Select Department</option>
                                <option value="CS">Computer Science</option>
                                <option value="MATH">Mathematics</option>
                                <option value="PHY">Physics</option>
                                <option value="CHEM">Chemistry</option>
                                <option value="BIO">Biology</option>
                                <option value="ENG">English</option>
                                <option value="HIST">History</option>
                                <option value="GEO">Geography</option>
                                <option value="ECON">Economics</option>
                                <option value="COMM">Commerce</option>
                                <option value="PE">Physical Education</option>
                                <option value="ART">Arts</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>

                        <input type="hidden" id="face_image" name="face_image">

                        <div id="statusMessage"
                            style="margin-top: 10px; font-size: 0.9rem; display:none; padding:10px; border-radius:12px;">
                        </div>

                        <button type="submit" id="submitBtn" class="btn-primary-theme"
                            style="width: 100%; margin-top: 1rem;" disabled>
                            Complete Registration
                        </button>
                    </div>
                </form>
            </div>

            <!-- Right: Camera -->
            <div class="content-card">
                <div class="card-header">
                    <h2>Face Registration</h2>
                    <span class="badge-tag badge-purple">Required</span>
                </div>

                <div class="camera-box">
                    <video id="video" autoplay playsinline></video>
                    <img id="capturedImage"
                        style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 16px;">
                    <canvas id="canvas" style="display: none;"></canvas>
                </div>

                <div style="margin-top: 1.5rem; text-align: center;">
                    <button id="captureBtn" class="btn-secondary-theme" style="width: 100%;">
                        <i class="fas fa-camera"></i> Capture Face
                    </button>
                    <button id="retakeBtn" class="btn-secondary-theme" style="width: 100%; display: none;">
                        <i class="fas fa-redo"></i> Retake Photo
                    </button>
                    <p style="margin-top: 1rem; font-size: 0.85rem; color: #6B7280;">
                        Position the face within the frame. Ensure good lighting for best results.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const capturedImage = document.getElementById('capturedImage');
        const faceInput = document.getElementById('face_image');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Access WebCam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Error accessing camera: ", err);
                statusMessage.style.display = 'block';
                statusMessage.style.background = '#fee2e2';
                statusMessage.style.color = '#ef4444';
                statusMessage.innerText = 'Camera access denied. Please allow permission.';
            });

        // Capture Logic
        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg');
            faceInput.value = imageData;

            // Show captured image preview
            capturedImage.src = imageData;
            capturedImage.style.display = 'block';
            video.style.display = 'none';

            // Toggle buttons
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-flex';
            submitBtn.disabled = false;
        });

        retakeBtn.addEventListener('click', () => {
            // Reset UI
            capturedImage.style.display = 'none';
            video.style.display = 'block';
            faceInput.value = '';

            captureBtn.style.display = 'inline-flex';
            retakeBtn.style.display = 'none';
            submitBtn.disabled = true;
        });

        // Submit Form
        function submitForm(event) {
            event.preventDefault();
            const formData = new FormData(document.getElementById('teacherForm'));

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

            fetch('{% url "add_teacher" %}', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    statusMessage.style.display = 'block';
                    if (data.status === 'success') {
                        statusMessage.style.background = '#dcfce7';
                        statusMessage.style.color = '#15803d';
                        statusMessage.innerText = data.message;
                        setTimeout(() => window.location.href = '/principal/dashboard/', 2000);
                    } else {
                        statusMessage.style.background = '#fee2e2';
                        statusMessage.style.color = '#b91c1c';
                        statusMessage.innerText = data.message;
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Complete Registration';
                    }
                })
                .catch(error => {
                    statusMessage.style.display = 'block';
                    statusMessage.style.background = '#fee2e2';
                    statusMessage.style.color = '#b91c1c';
                    statusMessage.innerText = 'Server error occurred.';
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Complete Registration';
                });
        }
    </script>
</body>

</html>
